name: Release NPM Package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` is needed to create the GitHub release.
      contents: write
      # `id-token: write` is required for npm Trusted Publishing and
      # automatic provenance attestation.
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --ci
      - run: npm run build

      # No --provenance flag needed: npm Trusted Publishing generates
      # the attestation automatically when the id-token: write permission
      # is granted and the package has a Trusted Publisher configured on
      # npmjs.com.
      #
      # No NODE_AUTH_TOKEN: Trusted Publishing uses short-lived OIDC
      # credentials.
      - run: npm publish --access public

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
